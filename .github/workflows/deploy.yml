# ============================================================
# .github/workflows/deploy.yml
# Full CI/CD: Test → Build → Deploy Frontend & Backend
# Triggers on push to main branch
# ============================================================

name: 🚀 Deploy to AWS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  NODE_VERSION: "20"

jobs:
  # ── 1. Lint & Type Check ──────────────────────────────────────
  quality:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Type check
        run: cd frontend && npm run type-check

      - name: Lint
        run: cd frontend && npm run lint

  # ── 2. Deploy Frontend to S3 + CloudFront ─────────────────────
  deploy-frontend:
    name: ☁️ Deploy Frontend → S3/CloudFront
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build Next.js (static export)
        run: cd frontend && npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.API_GATEWAY_URL }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync frontend/out/ s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --cache-control "max-age=31536000,public" \
            --exclude "*.html"
          # HTML files: no cache (always fresh)
          aws s3 sync frontend/out/ s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --cache-control "no-cache" \
            --include "*.html"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: ✅ Done
        run: echo "Frontend deployed to https://${{ secrets.CLOUDFRONT_DOMAIN }}"

  # ── 3. Deploy Backend Lambdas ─────────────────────────────────
  deploy-backend:
    name: ⚡ Deploy Backend → Lambda
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install & build backend
        run: |
          cd backend
          npm ci
          npm run build  # TypeScript → JS in dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Package and deploy auth Lambda
        run: |
          cd backend/lambdas/auth
          zip -r auth.zip dist/ node_modules/
          aws lambda update-function-code \
            --function-name taskflow-auth-dev \
            --zip-file fileb://auth.zip

      - name: Package and deploy tasks Lambda
        run: |
          cd backend/lambdas/tasks
          zip -r tasks.zip dist/ node_modules/
          aws lambda update-function-code \
            --function-name taskflow-tasks-dev \
            --zip-file fileb://tasks.zip

      - name: ✅ Done
        run: echo "Lambda functions updated!"

  # ── 4. Summary ───────────────────────────────────────────────
  summary:
    name: 📋 Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Print summary
        run: |
          echo "## 🚀 Deployment Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend (S3 + CloudFront) | ✅ Deployed |" >> $GITHUB_STEP_SUMMARY
          echo "| Auth Lambda | ✅ Updated |" >> $GITHUB_STEP_SUMMARY
          echo "| Tasks Lambda | ✅ Updated |" >> $GITHUB_STEP_SUMMARY
